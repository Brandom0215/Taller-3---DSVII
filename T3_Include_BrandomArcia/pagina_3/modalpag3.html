<!-- inicio modal -->
<!-- esta es una ventana que aparece cuando el usuario hace clic en el boton -->
<div id="modal1" class="modal fade">

  <!-- contenedor principal del modal -->
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- parte de arriba del modal -->
      <div class="modal-header">
        <!-- boton para cerrar la ventana -->
        <button class="close" data-dismiss="modal">&times;</button>

        <!-- titulo del modal -->
        <h4>Educacion de calidad</h4>
      </div>

      <!-- contenido del modal -->
      <div class="modal-body">
        <p>La educacion es clave para un desarrollo sostenible.</p>
      </div>

      <!-- parte de abajo con botones -->
      <div class="modal-footer">
        <!-- boton para cerrar -->
        <button class="btn btn-default" data-dismiss="modal">Cerrar</button>
      </div>

    </div>
  </div>

</div>
<!-- fin modal -->
